name: Generate SEO Files

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-seo:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Create directories
      run: |
        mkdir -p scripts
        mkdir -p public
        
    - name: Generate sitemap.xml
      run: |
        echo '<?xml version="1.0" encoding="UTF-8"?>
        <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          <url>
            <loc>https://${{ github.repository_owner }}.github.io/</loc>
            <lastmod>'$(date +%Y-%m-%d)'</lastmod>
            <changefreq>weekly</changefreq>
            <priority>1.0</priority>
          </url>
        </urlset>' > sitemap.xml
        
    - name: Generate robots.txt
      run: |
        echo 'User-agent: *
        Allow: /
        Sitemap: https://${{ github.repository_owner }}.github.io/sitemap.xml
        Crawl-delay: 1' > robots.txt
        
    - name: Create 404 page
      run: |
        echo '<!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <meta http-equiv="refresh" content="0;url=/" />
          <title>Redirecionando...</title>
        </head>
        <body>
          <script>window.location.href = "/";</script>
          <p><a href="/">Clique aqui se não for redirecionado</a></p>
        </body>
        </html>' > 404.html
        
    - name: List generated files
      run: |
        echo "📁 Arquivos gerados:"
        ls -la *.xml *.txt *.html 2>/dev/null || echo "Alguns arquivos podem não existir"
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages
        force_orphan: true
