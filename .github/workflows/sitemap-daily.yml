name: Gerar Sitemap + Graph.json Diariamente

on:
  schedule:
    # Roda todo dia às 06:00 BRT (09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:   # Permite rodar manualmente pelo botão

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar gerador
        run: python3 gerar_sitemap.py

      - name: Verificar se os arquivos foram gerados
        run: |
          echo "📄 Verificando arquivos..."
          ls -lh sitemap.xml graph.json
          echo "✅ sitemap.xml: $(wc -l < sitemap.xml) linhas"
          echo "✅ graph.json: $(python3 -c "import json; d=json.load(open('graph.json')); print(d['totalNodes'], 'nós')")"

      - name: Commitar e pushar alterações
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml graph.json
          # Só commita se houve mudança real
          if git diff --cached --quiet; then
            echo "📭 Nenhuma alteração — sitemaps já estão atualizados."
          else
            git commit -m "🔄 Atualização automática de sitemap e grafo [$(date +%Y-%m-%d)]"
            git push
            echo "🚀 Alterações commitadas e enviadas."
          fi
