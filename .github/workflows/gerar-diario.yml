name: Gerar sitemap.xml e graph.json (diário)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Gerar artefatos
        run: python scripts/gerar.py --repo-dir . --output-dir .

      - name: Verificar mudanças
        id: diff
        run: |
          if git diff --quiet sitemap.xml graph.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "wikivendas-bot"
          git config user.email "bot@wikivendas.com.br"
          git add sitemap.xml graph.json
          git commit -m "🤖 Atualização automática: sitemap + graph ($(date +%Y-%m-%d))"
          git push
