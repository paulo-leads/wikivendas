name: Gerar sitemap.xml e graph.json (diário)

on:
  schedule:
    # Roda todo dia às 06:00 UTC (03:00 BRT)
    - cron: "0 6 * * *"
  workflow_dispatch:    # permite rodar manualmente pelo GitHub
  push:
    branches: [main]    # roda também quando der push na main

permissions:
  contents: write       # precisa para commitar de volta

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 🏗️ Gerar sitemap.xml e graph.json
        run: python scripts/gerar.py --repo-dir . --output-dir .

      - name: 👀 Verificar se houve mudanças
        id: diff
        run: |
          if git diff --quiet sitemap.xml graph.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 📦 Commitar e push (se mudou)
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "wikivendas-bot"
          git config user.email "bot@wikivendas.com.br"
          git add sitemap.xml graph.json
          git commit -m "🤖 Atualização automática: sitemap.xml + graph.json ($(date +%Y-%m-%d))"
          git push
