# .github/workflows/deploy.yml (Trecho de passos)
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Criar package.json Bruto
        run: |
          echo '{"type": "module"}' > package.json

      - name: Executar Script de Engenharia Semântica (Build)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          SITE_BASE_URL: "https://wikivendas.com.br"
          SITE_TITLE: "Wikivendas — Enciclopédia de Inteligência Comercial"
        run: node scripts/build.js

      - name: Deploy para o GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: wikivendas.com.br
