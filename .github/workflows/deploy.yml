# .github/workflows/deploy.yml
name: Build e Deploy Wikivendas

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [notion_update]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # FIX: Removido o 'cache: npm' para evitar o erro de falta de arquivo lock

      - name: Instalar Dependências e Inicializar Ambiente
        run: |
          if [ ! -f package.json ]; then
            echo "📦 Inicializando package.json bruto..."
            npm init -y
          fi
          echo "📥 Instalando cliente oficial do Notion..."
          npm install @notionhq/client

      - name: Executar Script de Engenharia Semântica (Build)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          SITE_BASE_URL: "https://wikivendas.com.br"
          SITE_TITLE: "Wikivendas — Enciclopédia de Inteligência Comercial"
        run: node scripts/build.js

      - name: Deploy para o GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: wikivendas.com.br
