name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js (sem cache, sem forçar versão)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: ''

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL || 'https://wikivendas.com.br' }}
          NOTION_JSON_PROPERTY: ${{ secrets.NOTION_JSON_PROPERTY || 'JSON-LD' }}
          NOTION_MD_PROPERTY: ${{ secrets.NOTION_MD_PROPERTY || 'mkdom' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
